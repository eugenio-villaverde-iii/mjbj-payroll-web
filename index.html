<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="_ds/mjbj-payroll-design-system-25cef11c-5224-4c28-b1db-d40495526e52/tokens/fonts.css">
  <link rel="stylesheet" href="_ds/mjbj-payroll-design-system-25cef11c-5224-4c28-b1db-d40495526e52/tokens/colors.css">
  <link rel="stylesheet" href="_ds/mjbj-payroll-design-system-25cef11c-5224-4c28-b1db-d40495526e52/tokens/typography.css">
  <link rel="stylesheet" href="_ds/mjbj-payroll-design-system-25cef11c-5224-4c28-b1db-d40495526e52/tokens/spacing.css">
  <link rel="stylesheet" href="_ds/mjbj-payroll-design-system-25cef11c-5224-4c28-b1db-d40495526e52/tokens/effects.css">
  <link rel="stylesheet" href="_ds/mjbj-payroll-design-system-25cef11c-5224-4c28-b1db-d40495526e52/tokens/base.css">
  <link rel="stylesheet" href="_ds/mjbj-payroll-design-system-25cef11c-5224-4c28-b1db-d40495526e52/styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script src="_ds/mjbj-payroll-design-system-25cef11c-5224-4c28-b1db-d40495526e52/_ds_bundle.js"></script>
</helmet>
<div style="min-height:100vh;width:100%;display:flex;align-items:center;justify-content:center;background:var(--surface-canvas);font-family:var(--font-ui);padding:32px 16px;box-sizing:border-box">
  <div style="display:flex;flex-direction:column;align-items:center;gap:18px;width:100%;max-width:384px">

    <!-- Brand lockup: platform primary, module secondary -->
    <div style="display:flex;align-items:center;gap:12px;align-self:flex-start;padding-left:2px">
      <div style="width:44px;height:44px;border-radius:12px;background:var(--color-accent);display:flex;align-items:center;justify-content:center;flex:0 0 auto">
        <span style="font-family:var(--font-display);font-weight:700;font-size:26px;color:var(--text-on-accent);letter-spacing:-1px;line-height:1">M</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:3px">
        <span style="font-family:var(--font-display);font-weight:700;font-size:21px;color:var(--text-primary);letter-spacing:-0.02em;line-height:1">MJBJ</span>
        <span style="font-family:var(--font-ui);font-weight:600;font-size:10px;color:var(--text-accent);text-transform:uppercase;letter-spacing:0.14em;line-height:1;background:var(--color-accent-subtle);border:1px solid var(--color-accent-border);padding:3px 7px;border-radius:4px;align-self:flex-start">Payroll</span>
      </div>
    </div>

    <!-- Sign-in card -->
    <div style="width:100%;background:var(--surface-content);border:1px solid var(--border-default);border-radius:var(--radius);box-shadow:var(--shadow-md);box-sizing:border-box;padding:28px 28px 24px">
      <h1 style="font-family:var(--font-display);font-weight:700;font-size:var(--text-xl);color:var(--text-primary);letter-spacing:-0.01em;margin:0 0 4px">Sign in</h1>
      <p style="font-family:var(--font-ui);font-size:var(--text-base);color:var(--text-secondary);margin:0 0 20px">Enter your credentials to access the payroll console.</p>

      <sc-if value="{{ showError }}" hint-placeholder-val="{{ false }}">
        <div role="alert" style="display:flex;align-items:flex-start;gap:8px;background:rgba(214,59,59,0.07);border:1px solid rgba(214,59,59,0.32);border-radius:var(--radius-md);padding:9px 11px;margin-bottom:16px">
          <i class="bi bi-exclamation-circle-fill" style="color:var(--danger);font-size:14px;line-height:1.4"></i>
          <span style="font-family:var(--font-ui);font-size:var(--text-table);color:var(--danger);line-height:1.4">{{ errorText }}</span>
        </div>
      </sc-if>

      <form onSubmit="{{ submit }}" style="display:flex;flex-direction:column;gap:14px">
        <x-import component-from-global-scope="MJBJPayrollDesignSystem_25cef1.Input" hint-size="100%,58px"
          label="Username" name="username" id="username" autoComplete="username"
          placeholder="e.g. admin" value="{{ username }}" onChange="{{ onUser }}" error="{{ userError }}"></x-import>
        <x-import component-from-global-scope="MJBJPayrollDesignSystem_25cef1.Input" hint-size="100%,58px"
          label="Password" name="password" id="password" type="password" autoComplete="current-password"
          placeholder="Enter your password" value="{{ password }}" onChange="{{ onPass }}" error="{{ passError }}"></x-import>
        <div style="margin-top:4px">
          <x-import component-from-global-scope="MJBJPayrollDesignSystem_25cef1.Button" hint-size="100%,38px"
            type="submit" variant="primary" size="lg" block="{{ true }}" onClick="{{ submit }}">Sign in</x-import>
        </div>
      </form>
    </div>

    <p style="font-family:var(--font-ui);font-size:var(--text-sm);color:var(--text-muted);margin:0;text-align:center">Access is provisioned by your administrator.</p>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:640}}">
class Component extends DCLogic {
  state = { username: '', password: '', userError: null, passError: null, showError: false, errorText: '' };

  renderVals() {
    return {
      username: this.state.username,
      password: this.state.password,
      userError: this.state.userError,
      passError: this.state.passError,
      showError: this.state.showError,
      errorText: this.state.errorText,
      onUser: (e) => this.setState({ username: e.target.value, userError: null, showError: false }),
      onPass: (e) => this.setState({ password: e.target.value, passError: null, showError: false }),
      submit: (e) => {
        if (e && e.preventDefault) e.preventDefault();
        const u = this.state.username.trim();
        const p = this.state.password;
        const userError = u ? null : 'Enter your username';
        const passError = p ? null : 'Enter your password';
        if (userError || passError) {
          this.setState({ userError, passError, showError: false });
          return;
        }
        // Demo auth: accept admin / admin; everything else is an invalid-credentials error.
        const ok = u === 'admin' && p === 'admin';
        if (ok) {
          this.setState({ userError: null, passError: null, showError: false, errorText: '' });
        } else {
          this.setState({
            userError: ' ', passError: ' ', showError: true,
            errorText: 'Incorrect username or password. Please try again.',
          });
        }
      },
    };
  }
}
</script>
</body>
</html>
