<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MJBJ Payroll — Sign in (Preview)</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">

<div class="d-flex flex-column align-items-center gap-3" style="width:100%;max-width:384px;margin:0 auto;">

  <!-- Brand lockup: platform primary, module secondary -->
  <div class="d-flex align-items-center gap-2 align-self-start">
    <div style="width:44px;height:44px;border-radius:12px;background:var(--color-accent);display:flex;align-items:center;justify-content:center;flex:0 0 auto;">
      <span style="font-family:var(--font-display);font-weight:700;font-size:26px;color:var(--text-on-accent);letter-spacing:-1px;line-height:1;">M</span>
    </div>
    <div class="d-flex flex-column gap-1">
      <span style="font-family:var(--font-display);font-weight:700;font-size:21px;color:var(--text-primary);letter-spacing:-0.02em;line-height:1;">MJBJ</span>
      <span style="font-family:var(--font-ui);font-weight:600;font-size:10px;color:var(--text-accent);text-transform:uppercase;letter-spacing:0.14em;line-height:1;background:var(--color-accent-subtle);border:1px solid var(--color-accent-border);padding:3px 7px;border-radius:4px;align-self:flex-start;">Payroll</span>
    </div>
  </div>

  <!-- Sign-in card -->
  <div class="content-card w-100" style="box-shadow:var(--shadow-md);padding:28px 28px 24px;">
    <h1 class="font-display fw-bold mb-1" style="font-size:var(--text-xl);color:var(--text-primary);">Sign in</h1>
    <p class="mb-3" style="color:var(--text-secondary);">Enter your credentials to access the payroll console.</p>

    <form>
      <div class="mb-3">
        <label class="form-label small fw-medium">Username</label>
        <input type="text" class="form-control" placeholder="e.g. admin" autocomplete="username">
      </div>
      <div class="mb-3">
        <label class="form-label small fw-medium">Password</label>
        <input type="password" class="form-control" placeholder="Enter your password" autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary btn-lg w-100">Sign in</button>
    </form>
  </div>

  <p class="text-center small mb-0" style="color:var(--text-muted);">Access is provisioned by your administrator.</p>
</div>

</body>
</html>
